    <!-- A blocks -->
    <use href="#stone-block" x="65" y="29" />
    <use href="#stone-block" x="71" y="29" />
    <use href="#stone-block" x="59" y="35" />
    <use href="#stone-block" x="65" y="35" />
    <use href="#stone-block" x="71" y="35" />
    <use href="#stone-block" x="77" y="35" />
    <use href="#stone-block" x="53" y="41" />
    <use href="#stone-block" x="59" y="41" />
    <use href="#stone-block" x="77" y="41" />
    <use href="#stone-block" x="83" y="41" />
    <use href="#stone-block" x="53" y="47" />
    <use href="#stone-block" x="59" y="47" />
    <use href="#stone-block" x="65" y="47" />
    <use href="#stone-block" x="71" y="47" />
    <use href="#stone-block" x="77" y="47" />
    <use href="#stone-block" x="83" y="47" />
    <use href="#stone-block" x="53" y="53" />
    <use href="#stone-block" x="59" y="53" />
    <use href="#stone-block" x="77" y="53" />
    <use href="#stone-block" x="83" y="53" />
    <use href="#stone-block" x="53" y="59" />
    <use href="#stone-block" x="59" y="59" />
    <use href="#stone-block" x="77" y="59" />
    <use href="#stone-block" x="83" y="59" />
    <use href="#stone-block" x="53" y="65" />
    <use href="#stone-block" x="59" y="65" />
    <use href="#stone-block" x="77" y="65" />
